services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: vevsdesign:${APP_VERSION:-dev}
    container_name: vevsdesign
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/log/nginx
      - /var/run
