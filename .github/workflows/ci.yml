name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: filipcsupka/vevsdesign

jobs:
  static-site:
    name: Build, test, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify required files
        run: |
          set -euo pipefail

          test -f preview.html
          test -f Dockerfile
          test -f Caddyfile
          test -f "Feminine Floral wedding studio logo.png"
          test -f images/gallery/placeholder.png

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: vevsdesign:ci

      - name: Validate Caddy config
        run: docker run --rm --entrypoint caddy vevsdesign:ci validate --config /etc/caddy/Caddyfile

      - name: Smoke test served site
        run: |
          set -euo pipefail

          cleanup() {
            status=$?
            if [ "$status" -ne 0 ]; then
              docker logs vevsdesign-ci || true
            fi
            docker rm -f vevsdesign-ci || true
            exit "$status"
          }
          trap cleanup EXIT

          docker run --rm -d --name vevsdesign-ci -p 8080:8080 vevsdesign:ci

          for attempt in $(seq 1 20); do
            if curl -fsS http://localhost:8080/healthz && curl -fsS http://localhost:8080/preview.html -o /tmp/preview.html; then
              break
            fi

            if [ "$attempt" -eq 20 ]; then
              echo "Site did not become ready in time."
              exit 1
            fi

            sleep 1
          done

          grep -F "Vevsdesign" /tmp/preview.html
          grep -F "contact-form" /tmp/preview.html
          grep -F "formsubmit.co" /tmp/preview.html

          curl -fsSI "http://localhost:8080/Feminine%20Floral%20wedding%20studio%20logo.png"
          curl -fsSI http://localhost:8080/images/gallery/placeholder.png

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Set up Kustomize
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Checkout infra repository
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          repository: Filipcsupka/infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update GitOps image tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: infra/gitops/apps/vevsdesign/overlays/prod
        run: kustomize edit set image ghcr.io/filipcsupka/vevsdesign=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}

      - name: Commit GitOps image tag
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: infra
        run: |
          if git diff --quiet; then
            echo "No GitOps changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/vevsdesign/overlays/prod/kustomization.yaml
          git commit -m "deploy vevsdesign sha-${GITHUB_SHA::7}"
          git push
