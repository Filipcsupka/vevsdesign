# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name vevsdesign.sk www.vevsdesign.sk;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS with HTTP/2
server {
    listen 443 ssl;
    http2 on;
    server_name vevsdesign.sk www.vevsdesign.sk;

    ssl_certificate     /etc/letsencrypt/live/vevsdesign.sk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vevsdesign.sk/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000" always;

    root /usr/share/nginx/html;
    index preview.html;

    location / {
        try_files $uri $uri/ /preview.html;
    }

    # Images — long cache, served efficiently
    location /images/ {
        expires 90d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # Other static assets
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
